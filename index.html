/* ============================================================
   Entrenador Kegel — UI moderna (2026)
   Sistema de diseño con design tokens · escalable · dark mode
   Mantiene los hooks funcionales del entrenador:
   #estado #estadoText #contador #progreso img #cReps #muteLink #muteText
   .ph-button .ph-btn-blue/red/green  ·  inicio()/fin()/mute()
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

/* ---------- Reset mínimo ---------- */
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body { margin: 0; }
img { border: 0; max-width: 100%; }
h1, h2, h3, h4, p { margin: 0; }
[id] { scroll-margin-top: 84px; }

/* ---------- Design tokens (claro) ---------- */
:root {
  --bg: #eef1f8;
  --bg-grad-1: #eceffb;
  --bg-grad-2: #f6f1fb;
  --surface: #ffffff;
  --surface-2: #f7f8fc;
  --surface-3: #eef1f8;
  --border: #e5e8f2;
  --border-strong: #d4d9e8;

  --text: #171a2b;
  --text-muted: #5f6785;
  --text-soft: #8b93ad;

  --primary: #6d5efc;
  --primary-600: #5a49f0;
  --primary-050: #eeecff;
  --on-primary: #ffffff;

  --accent: #06b6d4;

  /* estados del entrenador */
  --contract: #f5385d;
  --rest: #10b981;
  --prep: #7c8cff;
  --finish: #eef2ff;

  --radius-xl: 26px;
  --radius: 18px;
  --radius-sm: 12px;
  --radius-pill: 999px;

  --shadow-sm: 0 1px 2px rgba(23,26,43,.06), 0 1px 3px rgba(23,26,43,.05);
  --shadow: 0 6px 20px -6px rgba(23,26,43,.14), 0 2px 6px rgba(23,26,43,.06);
  --shadow-lg: 0 24px 60px -18px rgba(45,38,120,.35);
  --ring: 0 0 0 4px rgba(109,94,252,.28);

  --nav-h: 62px;
  --container: 1160px;
}

/* ---------- Dark mode automático ---------- */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0a0c16;
    --bg-grad-1: #0b0e1c;
    --bg-grad-2: #120f22;
    --surface: #151827;
    --surface-2: #1a1e30;
    --surface-3: #212540;
    --border: #262c44;
    --border-strong: #333a58;

    --text: #e9ebf6;
    --text-muted: #a3abc6;
    --text-soft: #7b83a0;

    --primary: #8a7dff;
    --primary-600: #7466ff;
    --primary-050: #211d3f;
    --finish: #1b1f3a;

    --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
    --shadow: 0 8px 24px -8px rgba(0,0,0,.6);
    --shadow-lg: 0 24px 60px -18px rgba(0,0,0,.7);
    --ring: 0 0 0 4px rgba(138,125,255,.35);
  }
}

/* ---------- Base ---------- */
body {
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Open Sans', sans-serif;
  color: var(--text);
  background:
    radial-gradient(1200px 600px at 85% -10%, var(--bg-grad-2), transparent 60%),
    radial-gradient(900px 500px at 0% 0%, var(--bg-grad-1), transparent 55%),
    var(--bg);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: var(--primary); text-decoration: none; transition: color .18s ease; }
a:hover { color: var(--primary-600); }

/* Contenedor (sustituye a onepcssgrid) */
.onepcssgrid-1200, .onepcssgrid-1000 {
  width: 100%;
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 clamp(16px, 4vw, 40px);
}
.onerow { clear: both; padding: 0; }
/* Neutraliza el grid antiguo de columnas */
.col1,.col2,.col3,.col4,.col5,.col6,.col7,.col8,.col9,.col10,.col11,.col12 {
  float: none; width: 100%; margin: 0;
}
.clearfix { clear: both; }
.ads300x250, .ads728x90, .ads468x60, .header-ads, .sidebar-ads { display: none !important; }

/* ============================================================
   HEADER / HERO
   ============================================================ */
#header { position: relative; }
#topbar { display: none; }

#title {
  padding: clamp(28px, 5vw, 52px) clamp(16px, 4vw, 40px) clamp(20px, 3vw, 30px);
  text-align: center;
}
#logo { float: none; margin: 0; text-align: center; }
#title h1 {
  font-size: clamp(1.7rem, 4.5vw, 2.6rem);
  font-weight: 800;
  letter-spacing: -.02em;
  line-height: 1.1;
}
#title h1 a {
  background: linear-gradient(100deg, var(--primary), var(--accent));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
#title h3 {
  margin-top: .55rem;
  font-size: clamp(.9rem, 2vw, 1.05rem);
  font-weight: 500;
  color: var(--text-muted);
}

/* ============================================================
   NAV
   ============================================================ */
#cssmenu {
  position: sticky; top: 0; z-index: 50;
  background: color-mix(in srgb, var(--surface) 82%, transparent);
  -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  width: auto;
}
#cssmenu .onepcssgrid-1200 { padding-top: 0; padding-bottom: 0; }
#cssmenu ul {
  list-style: none; margin: 0; padding: 8px 0;
  display: flex; flex-wrap: wrap; gap: 6px;
  align-items: center; justify-content: center;
  min-height: var(--nav-h);
}
#cssmenu ul li { display: block; margin: 0; padding: 0; }
#cssmenu ul li a {
  display: block;
  padding: 10px 18px;
  border-radius: var(--radius-pill);
  color: var(--text-muted);
  font-weight: 600;
  font-size: .82rem;
  letter-spacing: .02em;
  text-transform: uppercase;
  transition: background-color .2s ease, color .2s ease, transform .2s ease;
}
#cssmenu ul li a::before, #cssmenu ul li a::after { display: none; }
#cssmenu ul li a:hover { color: var(--text); background: var(--surface-3); transform: translateY(-1px); }
#cssmenu ul li.active a {
  color: var(--on-primary);
  background: linear-gradient(100deg, var(--primary), var(--primary-600));
  box-shadow: var(--shadow-sm);
}

/* ============================================================
   CONTENIDO
   ============================================================ */
#content {
  background: transparent;
  padding: clamp(24px, 4vw, 44px) clamp(16px, 4vw, 40px) clamp(40px, 6vw, 72px);
}
#content > .onerow > .col12,
#content > .onerow > [class^="col"] { display: block; }

/* Encabezado de sección de la home */
#content h2 {
  font-size: clamp(1.5rem, 3.5vw, 2.1rem);
  font-weight: 800;
  letter-spacing: -.02em;
  margin-bottom: .4rem;
}
#content > .onerow > [class^="col"] > p {
  color: var(--text-muted);
  max-width: 70ch;
  margin-bottom: 1.5rem;
}

/* ---------- Tarjeta de semana (trainbox) ---------- */
.trainbox {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow);
  text-align: left;
  margin: 0 0 clamp(18px, 3vw, 26px);
  padding: clamp(18px, 3vw, 28px);
  overflow: hidden;
}
.trainbox h3 {
  position: relative;
  display: inline-flex; align-items: center; gap: .6rem;
  background: transparent; color: var(--text);
  width: auto; margin: 0 0 1.25rem; padding: 0 0 0 16px;
  font-size: clamp(1.15rem, 2.6vw, 1.5rem); font-weight: 800; letter-spacing: -.01em;
}
.trainbox h3::before {
  content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 5px; height: 1.15em; border-radius: 999px;
  background: linear-gradient(180deg, var(--primary), var(--accent));
}

/* ---------- Grid de días ---------- */
.ulbox {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: clamp(12px, 1.6vw, 16px);
}
.ulbox ul {
  list-style: none; margin: 0; padding: 14px;
  min-width: 0;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex; flex-direction: column; gap: 8px;
  transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}
.ulbox ul:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--border-strong); }
.ulbox ul li { padding: 0; }
.ulbox ul li h4 {
  border: 0; background: transparent; color: var(--text-soft);
  padding: 0 0 2px; margin: 0 0 2px;
  font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
}
.ulbox ul li a {
  display: block; text-align: center;
  padding: 11px 10px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-weight: 700; font-size: .92rem; letter-spacing: .01em;
  transition: transform .15s ease, background-color .2s ease, color .2s ease, border-color .2s ease, box-shadow .2s ease;
}
.ulbox ul li a:hover {
  background: linear-gradient(100deg, var(--primary), var(--primary-600));
  border-color: transparent; color: var(--on-primary);
  transform: translateY(-2px); box-shadow: var(--shadow-sm);
}
.ulbox ul li a:active { transform: translateY(0); }

/* Sección cíclicos: cada ul es un único chip -> centra el enlace */
.ciclicos-box .ulbox { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
.ciclicos-box .ulbox ul { justify-content: center; }

/* ============================================================
   ENTRENADOR (páginas de ejercicio)
   ============================================================ */
#entrenador {
  width: 100%; max-width: 640px; margin: clamp(18px, 3vw, 28px) auto;
  text-align: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg);
  padding: clamp(22px, 4vw, 40px);
}
#entrenador h3, #entrenador h4 { margin: 0; }
#entrenador a { text-decoration: none; }

/* Botones Iniciar / Detener */
.ph-container { margin: 0; display: flex; gap: 14px; justify-content: center; }
.ph-float-left, .ph-float-right, .ph-float { float: none; padding: 0; text-align: center; flex: 1 1 0; max-width: 220px; }
.ph-clear { clear: none; }

.ph-button {
  display: inline-flex; align-items: center; justify-content: center;
  width: 100%;
  border: 0; border-radius: var(--radius-pill);
  box-shadow: var(--shadow-sm);
  cursor: pointer; font-family: inherit; font-weight: 700; font-size: 1rem;
  letter-spacing: .01em; padding: 15px 28px;
  color: #fff; text-align: center; white-space: nowrap;
  transition: transform .16s ease, box-shadow .2s ease, filter .2s ease;
}
.ph-button:hover { transform: translateY(-2px); box-shadow: var(--shadow); filter: brightness(1.03); color: #fff; background-color: transparent; }
.ph-button:active { transform: translateY(0); }
.ph-button:focus-visible { outline: none; box-shadow: var(--ring); }

.ph-btn-blue { background: linear-gradient(100deg, var(--primary), var(--primary-600)); }
.ph-btn-blue:hover, .ph-btn-blue:focus, .ph-btn-blue:active { background: linear-gradient(100deg, var(--primary), var(--primary-600)); color: #fff; }
.ph-btn-red { background: linear-gradient(100deg, #fb5673, var(--contract)) !important; border: 0 !important; }
.ph-btn-red:hover, .ph-btn-red:focus, .ph-btn-red:active { background: linear-gradient(100deg, #fb5673, var(--contract)) !important; color: #fff; }
.ph-btn-green { background: linear-gradient(100deg, #24d69b, var(--rest)); }
.ph-btn-green:hover, .ph-btn-green:focus, .ph-btn-green:active { background: linear-gradient(100deg, #24d69b, var(--rest)); color: #fff; }

/* Caja de estado */
#controles { padding: 0 0 1rem; }
#controles h3, #estado h3 { border: 0; }

#estado {
  border: 0;
  background: var(--surface-2);
  color: var(--text);
  min-height: 190px; height: auto;
  margin: 20px 0 8px;
  padding: 28px 20px;
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  transition: background-color .35s ease, color .35s ease;
}
#estado h3 {
  margin: 0;
  font-size: clamp(1.6rem, 6vw, 2.6rem);
  font-weight: 800; letter-spacing: -.01em;
}

/* Dots de progreso */
#progreso {
  padding: 14px 4px 6px;
  display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center;
}
#progreso img {
  width: 18px; height: 18px;
  border-radius: 50%;
  filter: saturate(1.05);
  transition: transform .25s ease;
}

/* Contador + series */
#contdiv { margin-top: 6px; }
#contador {
  font-size: clamp(1.5rem, 5vw, 2rem);
  font-weight: 800; letter-spacing: .02em;
  font-variant-numeric: tabular-nums;
  color: var(--primary);
  margin: 6px 0 2px;
}
#cReps { color: var(--text-muted); font-weight: 600; font-size: .95rem; }

/* Botón mute */
#botonMute a, .ph-float a {
  margin: 14px auto 0;
  width: auto; max-width: 260px;
}

/* Texto de ayuda inferior en páginas de ejercicio */
#entrenador ~ p, #content .col12 > p:last-of-type,
#content [class^="col"] > p {
  color: var(--text-muted);
}

/* ============================================================
   Accesibilidad / motion
   ============================================================ */
a:focus-visible, #cssmenu ul li a:focus-visible, .ulbox ul li a:focus-visible {
  outline: none; box-shadow: var(--ring);
}
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: .001ms !important; transition-duration: .001ms !important; scroll-behavior: auto !important; }
}

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 640px) {
  .ph-container { flex-direction: row; }
  .ulbox { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
  #entrenador { border-radius: var(--radius); }
}
@media (max-width: 380px) {
  #cssmenu ul li a { padding: 9px 12px; font-size: .74rem; }
}

/* ---- SPA extra ---- */
#view { min-height: 40vh; }
.back-link { display:inline-flex; align-items:center; gap:6px; color:var(--text-muted); font-weight:600; margin:0 0 10px; cursor:pointer; }
.back-link:hover { color:var(--primary); }
#progreso .dot { display:inline-block; width:18px; height:18px; border-radius:50%; border:2px solid var(--border-strong); background:transparent; transition: background-color .2s ease, border-color .2s ease, box-shadow .2s ease; }
#progreso .dot.on { background: var(--rest); border-color: var(--rest); box-shadow: 0 0 0 3px color-mix(in srgb, var(--rest) 22%, transparent); }
#cReps { color: var(--text-muted); font-weight:600; }
</style>
</head>

/* ---------- Audio nativo con desbloqueo iOS ---------- */
var sounds = {}, audioReady = false;
for (var k in AUDIO) { sounds[k] = new Audio(AUDIO[k]); sounds[k].preload = 'auto'; }
function unlock(){
  if (audioReady) return; audioReady = true;
  for (var k in sounds){ try { var a=sounds[k]; a.play().then(function(){a.pause();a.currentTime=0;}).catch(function(){}); } catch(e){} }
}
function play(k){ if (muteFlag) return; var a=sounds[k]; if(!a) return; try{ a.currentTime=0; a.play().catch(function(){}); }catch(e){} }

/* ---------- Motor del entrenador (fiel al original) ---------- */
var EX=null, t=0, cc=0, d=0, muteFlag=0, repCiclicos=0, tCiclicos=-4, termino=0, segTotal=0, ciclicosFlag=0;
var C = { c:'#f5385d', cT:'#ffffff', d:'#10b981', dT:'#ffffff', p:'#7c8cff', pT:'#ffffff', f:'#eef2ff', fT:'#4338ca' };
function $id(x){ return document.getElementById(x); }
function dots(){ return document.querySelectorAll('#progreso .dot'); }
function setEstado(sound,bg,fg,txt){ play(sound); var e=$id('estado'); if(!e) return; e.style.backgroundColor=bg; e.style.color=fg; $id('estadoText').textContent=txt; }
function varReset(){ cc=0; clearTimeout(d); t=0; if($id('contador')) $id('contador').textContent='000'; if(!ciclicosFlag){ dots().forEach(function(el){el.classList.remove('on');}); } if($id('cReps')) $id('cReps').textContent=''; }
function inicio(){ if(!EX) return; unlock(); termino=0; varReset(); main(); }
function fin(){ setEstado('f', C.f, C.fT, 'Fin del Ejercicio'); varReset(); termino=1; }
function mute(){ muteFlag = muteFlag?0:1; var l=$id('muteLink'), tx=$id('muteText'); if(!l) return; if(muteFlag){ l.style.filter='grayscale(1)'; l.style.opacity='.7'; tx.textContent='activar sonido'; } else { l.style.filter=''; l.style.opacity=''; tx.textContent='desactivar sonido'; } }
function main(){
  var serie = EX.serie;
  if (ciclicosFlag && t == (segTotal+3)) t = 3;
  var ch = serie.charAt(t);
  if (ch=='p'||ch=='k') setEstado('p', C.p, C.pT, 'PREPARATE');
  else if (ch=='x') setEstado('c', C.c, C.cT, '¡CONTRAE!');
  else if (ch=='s') setEstado('d', C.d, C.dT, 'Descansa');
  else if (ch=='q') setEstado('p', C.p, C.pT, '3');
  else if (ch=='w') setEstado('p', C.p, C.pT, '2');
  else if (ch=='e') setEstado('p', C.p, C.pT, '1');
  else if (ch=='f') fin();
  if (EX.indica.charAt(t)=='1' && !ciclicosFlag){ var ds=dots(); if(ds[cc]) ds[cc].classList.add('on'); cc++; }
  if (ciclicosFlag){ tCiclicos++; if (tCiclicos==EX.seg){ repCiclicos++; tCiclicos=0; } }
  if (t>2){
    if (!ciclicosFlag){ $id('contador').textContent = segTotal+3-t; }
    else { $id('cReps').textContent = 'Series: '+repCiclicos; $id('contador').textContent = (t-3)+' [seg]'; }
  }
  if (termino==0){ t=t+1; d=setTimeout(main, 1000); }
  else { $id('contador').textContent='000'; }
}

/* ---------- Render ---------- */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderHome(){
  var h = '<h2>Rutinas de Ejercicio</h2><p>'+DATA.intro+'</p>';
  DATA.sections.forEach(function(sec){
    h += '<div class="group trainbox'+(sec.ciclicos?' ciclicos-box':'')+'">';
    h += '<h3 id="sec-'+sec.id+'">'+esc(sec.label)+'</h3><div class="group ulbox">';
    sec.days.forEach(function(day){
      h += '<ul>';
      if (day.label) h += '<li><h4>'+esc(day.label)+'</h4></li>';
      day.links.forEach(function(l){
        h += '<li><a href="#/ex/'+encodeURIComponent(l.to)+'"'+(l.title?' title="'+esc(l.title)+'"':'')+'>'+esc(l.text)+'</a></li>';
      });
      h += '</ul>';
    });
    h += '</div></div>';
  });
  $id('view').innerHTML = h;
  setActive('home');
}

function renderEx(id){
  var ex = DATA.exercises[id];
  if (!ex){ renderHome(); return; }
  EX = ex;
  ciclicosFlag = ex.num >= 100 ? 1 : 0;
  segTotal = ex.seg * ex.num;
  termino = 0; muteFlag = 0; repCiclicos = 0; tCiclicos = -4; t = 0; cc = 0;
  var dotsHtml = '';
  if (!ciclicosFlag){ for (var i=0;i<ex.num;i++) dotsHtml += '<span class="dot"></span>'; }
  var h = ''
    + '<a class="back-link" href="#/">&larr; Volver a rutinas</a>'
    + '<h2>'+esc(ex.title)+'</h2><p>'+esc(ex.desc)+'</p>'
    + '<div class="group" id="entrenador">'
    +   '<div class="ph-container">'
    +     '<div class="ph-float-left"><h3><a href="javascript:void(0)" onclick="inicio()" class="ph-button ph-btn-blue">Iniciar</a></h3></div>'
    +     '<div class="ph-float-right"><h3><a href="javascript:void(0)" onclick="fin()" class="ph-button ph-btn-red">Detener</a></h3></div>'
    +   '</div><div class="ph-clear"></div>'
    +   '<div class="group" id="estado"><h3 id="estadoText">Presiona "Iniciar" para comenzar</h3></div>'
    +   '<div id="progreso">'+dotsHtml+'</div>'
    +   '<div id="contdiv"><p id="contador">000</p><p id="cReps"></p>'
    +     '<div class="ph-container"><div class="ph-float"><a href="javascript:void(0)" onclick="mute()" id="muteLink" class="ph-button ph-btn-green"><span id="muteText">desactivar sonido</span></a></div></div>'
    +     '<div class="ph-clear"></div>'
    +   '</div>'
    + '</div>';
  $id('view').innerHTML = h;
  setActive(ciclicosFlag ? 'ciclicos' : 'rutinas');
}

function setActive(nav){
  document.querySelectorAll('#cssmenu li').forEach(function(li){
    li.classList.toggle('active', li.getAttribute('data-nav')===nav);
  });
}

function route(){
  clearTimeout(d); termino = 1;
  var hsh = location.hash || '#/';
  if (hsh.indexOf('#/ex/')===0){
    renderEx(decodeURIComponent(hsh.slice(5)));
    window.scrollTo(0,0);
  } else {
    renderHome();
    if (hsh==='#/rutinas'){ var s=$id('sec-semana-1'); if(s) s.scrollIntoView({behavior:'smooth'}); }
    else if (hsh==='#/ciclicos'){ var c=$id('sec-ciclicos'); if(c) c.scrollIntoView({behavior:'smooth'}); }
    else window.scrollTo(0,0);
  }
}
window.addEventListener('hashchange', route);
window.addEventListener('DOMContentLoaded', route);
</script>
